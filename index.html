function st(t){return t?t.substring(0,5):'--:--';}
function nowMin(){const n=new Date();return n.getHours()*60+n.getMinutes();}
function getNext(times,nm){for(let i=0;i<SK.length;i++){const min=toMin(times[SK[i]]);if(min>nm)return{name:SN[i],key:SK[i],time:times[SK[i]],min};}return{name:'Subuh',key:'Fajr',time:times.Fajr,min:toMin(times.Fajr)+1440};}
async function fetchTimes(lat,lng,method){const d=new Date();const url='https://api.aladhan.com/v1/timings/'+pad(d.getDate())+'-'+pad(d.getMonth()+1)+'-'+d.getFullYear()+'?latitude='+lat+'&longitude='+lng+'&method='+method;const r=await fetch(url);if(!r.ok)throw new Error('HTTP '+r.status);const j=await r.json();if(j.code!==200)throw new Error(j.data||'API error');return j.data;}
function buildTicker(){const inner=document.getElementById('ticker-inner');let html='';for(let pass=0;pass<2;pass++){TICKER_ITEMS.forEach((item,i)=>{if(i>0||pass>0)html+='<span class="ticker-dot"></span>';html+='<span class="ticker-item">'+item.text+'<span class="ticker-src">— '+item.src+'</span></span>';});}inner.innerHTML=html;requestAnimationFrame(()=>{const totalW=inner.scrollWidth/2;const dur=Math.round(totalW/80);inner.style.animationDuration=dur+'s';});}
async function loadAll(){try{const prim=await fetchTimes(PRIMARY.lat,PRIMARY.lng,PRIMARY.method);primaryTimes=prim.timings;const h=prim.date.hijri;document.getElementById('s1-hijri').textContent=h.day+' '+h.month.en+' '+h.year+' H';const res=await Promise.allSettled(CITIES.map(c=>fetchTimes(c.lat,c.lng,c.method)));cityDataArr=CITIES.map((c,i)=>({name:c.name,tz:c.tz,times:res[i].status==='fulfilled'?res[i].value.timings:null}));document.getElementById('loading-overlay').style.display='none';ready=true;const nm=nowMin();buildStrip(nm,getNext(primaryTimes,nm).key);buildGrid(nm);showScreen(0);setInterval(()=>showScreen((current+1)%2),SLIDE_MS);}catch(e){const el=document.getElementById('ld-err');el.style.display='block';el.textContent='Gagal memuat: '+e.message+'. Pastikan internet aktif lalu refresh.';document.querySelector('.ld-spinner').style.display='none';}}
function buildStrip(nm,nextKey){if(!primaryTimes)return;let h='';STK.forEach((k,i)=>{const min=toMin(primaryTimes[k]);let cls=k===nextKey?'active':min<nm?'passed':'';if(i>0)h+='<div class="strip-sep"></div>';h+='<div class="strip-item '+cls+'"><span class="si-name">'+STN[i]+'</span><span class="si-time">'+st(primaryTimes[k])+'</span></div>';});document.getElementById('strip').innerHTML=h;}
function buildGrid(nm){let h='';cityDataArr.forEach(city=>{if(!city.times){h+='<div class="city-card"><div class="cc-city">'+city.name+'</div><div style="font-size:11px;color:rgba(240,237,228,0.3)">—</div></div>';return;}const next=getNext(city.times,nm);let rows='';SK.forEach((k,i)=>{const min=toMin(city.times[k]);let cls=k===next.key?'nxt':min<nm?'psd':'';rows+='<div class="cc-row '+cls+'"><span class="cc-n">'+SN[i]+'</span><span class="cc-t">'+st(city.times[k])+'</span></div>';});h+='<div class="city-card"><div class="cc-city">'+city.name+'</div><div class="cc-next-name">'+next.name+'</div><div class="cc-next-time">'+st(next.time)+' '+city.tz+'</div><div class="cc-line"></div><div class="cc-rows">'+rows+'</div></div>';});document.getElementById('grid').innerHTML=h;}
function tick(){const now=new Date();const H=now.getHours(),M=now.getMinutes(),S=now.getSeconds();const ts=pad(H)+':'+pad(M)+':'+pad(S);const nm=H*60+M;const ds=DAYS[now.getDay()]+', '+now.getDate()+' '+MONS[now.getMonth()]+' '+now.getFullYear();document.getElementById('s1-clock').textContent=ts;document.getElementById('s2-clock').textContent=ts;document.getElementById('s1-date').textContent=ds;document.getElementById('s2-date').textContent=ds;if(!ready||!primaryTimes)return;const next=getNext(primaryTimes,nm);document.getElementById('next-name').textContent=next.name;document.getElementById('next-time-disp').textContent=st(next.time)+' WIB';const nowSec=H*3600+M*60+S;const tSec=(next.min>=1440?next.min-1440:next.min)*60;let diff=next.min>=1440?(86400-nowSec+tSec):(tSec-nowSec);if(diff<0)diff=0;document.getElementById('cd-h').textContent=pad(Math.floor(diff/3600));document.getElementById('cd-m').textContent=pad(Math.floor((diff%3600)/60));document.getElementById('cd-s').textContent=pad(diff%60);if(nm!==lastMin){lastMin=nm;buildStrip(nm,next.key);buildGrid(nm);if(H===0&&M===1)loadAll();}}
function showScreen(idx){document.querySelectorAll('.screen').forEach((s,i)=>s.classList.toggle('active',i===idx));document.getElementById('d0').classList.toggle('on',idx===0);document.getElementById('d1').classList.toggle('on',idx===1);current=idx;const bar=document.getElementById('prog');bar.style.transition='none';bar.style.width='0%';void bar.offsetWidth;bar.style.transition='width '+SLIDE_MS+'ms linear';bar.style.width='100%';}
buildTicker();setInterval(tick,1000);tick();loadAll();
</script>
</body>
</html>
